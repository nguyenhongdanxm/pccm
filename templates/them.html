{% extends "base.html" %}
{% block title %}Thêm phân công – PCCM{% endblock %}
{% block content %}
<div class="row">
<div class="col-lg-6 mb-4">
<div class="card">
<div class="card-header"><i class="bi bi-plus-circle"></i> Thêm 1 phân công</div>
<div class="card-body">
<form method="post" action="{{ url_for('them') }}">
<div class="mb-3"><label class="form-label fw-semibold">Giáo viên *</label>
<select name="teacher" class="form-select" required><option value="">-- Chọn giáo viên --</option>
{% for t in teachers %}<option value="{{ t }}">{{ t }}</option>{% endfor %}</select></div>
<div class="mb-3"><label class="form-label fw-semibold">Môn học *</label>
<select name="subject" id="subject" class="form-select" required><option value="">-- Chọn môn --</option>
{% for s in subjects %}<option value="{{ s }}">{{ s }}</option>{% endfor %}</select></div>
<div class="mb-3"><label class="form-label fw-semibold">Lớp *</label>
<select name="class_name" id="class_name" class="form-select" required><option value="">-- Chọn lớp --</option>
{% for c in classes %}<option value="{{ c }}">{{ c }}</option>{% endfor %}</select></div>
<div class="mb-3"><label class="form-label fw-semibold">Số tiết</label>
<div id="periods-display" class="alert alert-success py-2 d-none">Số tiết tự động: <strong id="periods-value">0</strong></div>
<div id="periods-manual-wrap" class="d-none">
<input type="number" name="periods_manual" class="form-control" step="0.1" min="0" max="10" placeholder="Nhập số tiết thủ công">
<div class="form-text text-warning">Không tìm thấy số tiết chuẩn, vui lòng nhập tay.</div></div></div>
<div class="mb-3"><label class="form-label">Ghi chú</label>
<input type="text" name="note" class="form-control" placeholder="Tùy chọn"></div>
<button type="submit" class="btn btn-primary w-100"><i class="bi bi-save"></i> Lưu phân công</button>
</form></div></div></div>
<div class="col-lg-6 mb-4">
<div class="card">
<div class="card-header bg-success"><i class="bi bi-lightning"></i> Thêm nhanh nhiều lớp</div>
<div class="card-body">
<form method="post" action="{{ url_for('them_nhieu') }}">
<div class="mb-3"><label class="form-label fw-semibold">Giáo viên *</label>
<select name="teacher" class="form-select" required><option value="">-- Chọn --</option>
{% for t in teachers %}<option value="{{ t }}">{{ t }}</option>{% endfor %}</select></div>
<div class="mb-3"><label class="form-label fw-semibold">Môn học *</label>
<select name="subject" class="form-select" required><option value="">-- Chọn --</option>
{% for s in subjects %}<option value="{{ s }}">{{ s }}</option>{% endfor %}</select></div>
<div class="mb-3"><label class="form-label fw-semibold">Chọn nhiều lớp *</label>
<div class="row g-2">{% for c in classes %}
<div class="col-4 col-md-3"><div class="form-check">
<input class="form-check-input" type="checkbox" name="classes" value="{{ c }}" id="cls_{{ c }}">
<label class="form-check-label" for="cls_{{ c }}">{{ c }}</label></div></div>{% endfor %}</div></div>
<button type="submit" class="btn btn-success w-100"><i class="bi bi-lightning-fill"></i> Thêm tất cả lớp đã chọn</button>
</form></div></div></div></div>
{% endblock %}
{% block scripts %}
<script>
const subjectSelect = document.getElementById('subject');
const classSelect = document.getElementById('class_name');
const periodsDisplay = document.getElementById('periods-display');
const periodsValue = document.getElementById('periods-value');
const periodsManualWrap = document.getElementById('periods-manual-wrap');
function fetchPeriods() {
    const subject = subjectSelect.value;
    const cls = classSelect.value;
    if (!subject || !cls) { periodsDisplay.classList.add('d-none'); periodsManualWrap.classList.add('d-none'); return; }
    fetch(`/api/periods?subject=${encodeURIComponent(subject)}&class=${encodeURIComponent(cls)}`)
        .then(r => r.json()).then(data => {
            if (data.periods !== null && data.periods !== undefined) {
                periodsValue.textContent = data.periods;
                periodsDisplay.classList.remove('d-none');
                periodsManualWrap.classList.add('d-none');
            } else {
                periodsDisplay.classList.add('d-none');
                periodsManualWrap.classList.remove('d-none');
            }
        });
}
subjectSelect.addEventListener('change', fetchPeriods);
classSelect.addEventListener('change', fetchPeriods);
</script>
{% endblock %}
